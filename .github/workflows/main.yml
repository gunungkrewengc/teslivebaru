name: 👑 FFMPEG 8 CLOUD ENGINE (SMART DASHBOARD)

on:
  workflow_dispatch:
    inputs:
      # ==========================================
      # 🎥 KELOMPOK VIDEO (3 KANVAS)
      # ==========================================
      v1:
        description: '📹 [VIDEO 1] Utama (Wajib. Link MP4/M3U8)'
        required: true
        default: 'https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4'
      v2:
        description: '🎞️ [VIDEO 2] Layar PIP Kanan Atas (Opsional)'
        required: false
      v3:
        description: '🎞️ [VIDEO 3] Layar PIP Kiri Atas (Opsional)'
        required: false

      # ==========================================
      # 🎵 KELOMPOK AUDIO (3 JALUR MIXER)
      # ==========================================
      a1:
        description: '🎵 [AUDIO 1] Suara Utama Eksternal (Opsional)'
        required: false
      a2:
        description: '🔉 [AUDIO 2] BGM / Musik Latar (Opsional)'
        required: false
      a3:
        description: '🔉 [AUDIO 3] BGM / Musik Latar (Opsional)'
        required: false

      # ==========================================
      # 🖼️ KELOMPOK GAMBAR & LOGO (3 LAYER)
      # ==========================================
      i1:
        description: '🖼️ [GAMBAR 1] Logo / GIF Kanan Bawah (Opsional)'
        required: false
      i2:
        description: '🖼️ [GAMBAR 2] Logo / GIF Kiri Bawah (Opsional)'
        required: false
      i3:
        description: '🖼️ [GAMBAR 3] Logo / GIF Tengah Atas (Opsional)'
        required: false

      # ==========================================
      # 📝 KELOMPOK METADATA TEKS
      # ==========================================
      t_stat:
        description: '📝 [TEKS] Watermark Teks Diam (Opsional)'
        required: false
      t_run:
        description: '🏃 [TEKS] Running Text Berjalan (Opsional)'
        required: false

      # ==========================================
      # 🚀 KELOMPOK TRANSMISI JARINGAN
      # ==========================================
      rtmp:
        description: '🚀 [OUTPUT] RTMP Server URL'
        required: true
        default: 'rtmp://a.rtmp.youtube.com/live2'
      key:
        description: '🔑 [OUTPUT] Stream Key (Wajib)'
        required: true

jobs:
  live-streaming:
    runs-on: ubuntu-latest

    steps:
      - name: Siapkan Sistem Operasi & Pustaka Font
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -qq > /dev/null
          # Install FFmpeg & FreeFont untuk Drawtext Engine
          sudo apt install -t "o=LP-PPA-ubuntuhandbook1-ffmpeg8" ffmpeg -y -qq > /dev/null || sudo apt install ffmpeg -y -qq > /dev/null
          sudo apt install fonts-freefont-ttf -y -qq > /dev/null

      - name: Eksekusi FFmpeg 8 Smart Engine
        env:
          V1: ${{ github.event.inputs.v1 }}
          V2: ${{ github.event.inputs.v2 }}
          V3: ${{ github.event.inputs.v3 }}
          A1: ${{ github.event.inputs.a1 }}
          A2: ${{ github.event.inputs.a2 }}
          A3: ${{ github.event.inputs.a3 }}
          I1: ${{ github.event.inputs.i1 }}
          I2: ${{ github.event.inputs.i2 }}
          I3: ${{ github.event.inputs.i3 }}
          T_STAT: ${{ github.event.inputs.t_stat }}
          T_RUN: ${{ github.event.inputs.t_run }}
          RTMP: ${{ github.event.inputs.rtmp }}
          KEY: ${{ github.event.inputs.key }}
        run: |
          echo "=========================================================="
          echo "🔍 SISTEM ANALISIS TABRAKAN & PERINGATAN OTOMATIS (WARNINGS)"
          echo "=========================================================="
          
          # Validasi Dasar
          if [ -z "$V1" ]; then echo "⚠️ WARNING: Video Utama Kosong. Menggunakan Kanvas Hitam (Nullsrc)."; fi
          if [ -n "$V2" ] && [ -n "$V3" ]; then echo "ℹ️ INFO: Multi-PIP Aktif. Pastikan ruang visual cukup agar layar tidak penuh sesak."; fi
          
          declare -a FF_CMD
          FF_CMD=("-y" "-hide_banner")
          CUR_IDX=0

          # 1. PARSING INPUT VIDEO
          if [ -n "$V1" ]; then
            FF_CMD+=("-re" "-stream_loop" "-1" "-i" "$V1")
            V1_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1))
          else
            FF_CMD+=("-f" "lavfi" "-re" "-i" "color=c=black:s=1280x720:r=30")
            V1_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1))
          fi

          if [ -n "$V2" ]; then FF_CMD+=("-stream_loop" "-1" "-i" "$V2"); V2_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1)); fi
          if [ -n "$V3" ]; then FF_CMD+=("-stream_loop" "-1" "-i" "$V3"); V3_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1)); fi

          # 2. PARSING INPUT AUDIO
          A_COUNT=0
          if [ -n "$A1" ]; then FF_CMD+=("-stream_loop" "-1" "-i" "$A1"); A1_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1)); A_COUNT=$((A_COUNT+1)); fi
          if [ -n "$A2" ]; then FF_CMD+=("-stream_loop" "-1" "-i" "$A2"); A2_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1)); A_COUNT=$((A_COUNT+1)); fi
          if [ -n "$A3" ]; then FF_CMD+=("-stream_loop" "-1" "-i" "$A3"); A3_IDX=$CUR_IDX; CUR_IDX=$((CUR_IDX+1)); A_COUNT=$((A_COUNT+1)); fi

          # 3. PARSING INPUT GAMBAR & DETEKSI FORMAT GIF
          for IMG in "$I1" "$I2" "$I3"; do
            if [ -n "$IMG" ]; then
              if [[ "$IMG" == *.gif* || "$IMG" == *.GIF* ]]; then
                echo "✅ INFO: Format GIF terdeteksi pada tautan. Sistem otomatis mengaktifkan parameter animasi (-ignore_loop 0)."
                FF_CMD+=("-ignore_loop" "0" "-i" "$IMG")
              else
                FF_CMD+=("-loop" "1" "-i" "$IMG")
              fi
              if [ "$IMG" = "$I1" ]; then I1_IDX=$CUR_IDX; fi
              if [ "$IMG" = "$I2" ]; then I2_IDX=$CUR_IDX; fi
              if [ "$IMG" = "$I3" ]; then I3_IDX=$CUR_IDX; fi
              CUR_IDX=$((CUR_IDX+1))
            fi
          done

          echo "=========================================================="
          echo "⚙️ MEMBANGUN MATRIX FILTER KOMPLEKS (PIPELINE)"
          echo "=========================================================="

          # 4. MEMBUAT FILTER VIDEO
          FC="[$V1_IDX:v]scale=1280:720,fps=30,setsar=1[v_base];"
          ANCHOR="[v_base]"

          if [ -n "$V2_IDX" ]; then FC="${FC}[$V2_IDX:v]scale=320:-1[v2_s];${ANCHOR}[v2_s]overlay=W-w-20:20:shortest=1[v_v2];"; ANCHOR="[v_v2]"; fi
          if [ -n "$V3_IDX" ]; then FC="${FC}[$V3_IDX:v]scale=320:-1[v3_s];${ANCHOR}[v3_s]overlay=20:20:shortest=1[v_v3];"; ANCHOR="[v_v3]"; fi

          if [ -n "$I1_IDX" ]; then FC="${FC}[$I1_IDX:v]scale=150:-1[i1_s];${ANCHOR}[i1_s]overlay=W-w-20:H-h-20:shortest=1[v_i1];"; ANCHOR="[v_i1]"; fi
          if [ -n "$I2_IDX" ]; then FC="${FC}[$I2_IDX:v]scale=150:-1[i2_s];${ANCHOR}[i2_s]overlay=20:H-h-20:shortest=1[v_i2];"; ANCHOR="[v_i2]"; fi
          if [ -n "$I3_IDX" ]; then FC="${FC}[$I3_IDX:v]scale=150:-1[i3_s];${ANCHOR}[i3_s]overlay=(W-w)/2:20:shortest=1[v_i3];"; ANCHOR="[v_i3]"; fi

          # Engine Teks Otomatis (Font Linux Default)
          FONT_PATH="/usr/share/fonts/truetype/freefont/FreeSans.ttf"
          if [ -n "$T_STAT" ]; then
            FC="${FC}${ANCHOR}drawtext=fontfile=${FONT_PATH}:text='${T_STAT}':x=(W-tw)/2:y=H-th-40:fontsize=28:fontcolor=white:box=1:boxcolor=black@0.5[v_ts];"
            ANCHOR="[v_ts]"
          fi
          if [ -n "$T_RUN" ]; then
            FC="${FC}${ANCHOR}drawtext=fontfile=${FONT_PATH}:text='${T_RUN}':x=W-mod(t*120\,W+tw):y=H-th-10:fontsize=24:fontcolor=yellow:box=1:boxcolor=black@0.6[v_tr];"
            ANCHOR="[v_tr]"
          fi

          # Tutup Pipeline Grafis
          FC="${FC}${ANCHOR}format=yuv420p[v_out]"

          # 5. MEMBUAT FILTER AUDIO (MIXER)
          if [ "$A_COUNT" -gt 0 ]; then
            A_STREAMS=""
            if [ -n "$A1_IDX" ]; then A_STREAMS="$A_STREAMS [$A1_IDX:a]"; fi
            if [ -n "$A2_IDX" ]; then A_STREAMS="$A_STREAMS [$A2_IDX:a]"; fi
            if [ -n "$A3_IDX" ]; then A_STREAMS="$A_STREAMS [$A3_IDX:a]"; fi

            if [ "$A_COUNT" -eq 1 ]; then
              A_MAP_TARGET="${A_STREAMS#" "}" # Hapus spasi depan
            else
              FC="${FC}; $A_STREAMS amix=inputs=${A_COUNT}:duration=longest[a_out]"
              A_MAP_TARGET="[a_out]"
            fi
          else
            if [ -n "$V1" ]; then
              echo "ℹ️ INFO: Tidak ada input lagu terpisah. Otomatis menarik audio dari Video 1."
              A_MAP_TARGET="[$V1_IDX:a]?"
            else
