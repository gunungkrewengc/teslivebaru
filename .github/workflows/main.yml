name: STREAMER FFMPEG ULTIMATE BOX

on:
  workflow_dispatch:
    inputs:
      # ==========================================
      # 1. INPUT UTAMA & KONTROL DURASI
      # ==========================================
      video_source:
        description: '1. Video Utama (.mp4 / .m3u8 / Jalur Lokal)'
        required: true
        default: 'https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4'
      loop_video:
        description: '2. Looping Video? (Gunakan hanya untuk file .mp4 mati)'
        type: choice
        required: true
        default: 'tidak'
        options:
          - 'tidak'
          - 'ya (looping tanpa batas)'
      audio_source:
        description: '3. Audio Tambahan / Musik Latar (Kosongkan jika tidak pakai)'
        required: false
      image_source:
        description: '4. Overlay Gambar/Logo/GIF (Kosongkan jika tidak pakai)'
        required: false

      # ==========================================
      # 2. PENGATURAN TATA LETAK & RESOLUSI
      # ==========================================
      logo_width:
        description: '5. Lebar Overlay (pixel). Isi -1 untuk ukuran asli'
        required: true
        default: '200'
      logo_x:
        description: '6. Posisi X Overlay (Contoh: 10, W-w-10 untuk kanan)'
        required: true
        default: 'W-w-10'
      logo_y:
        description: '7. Posisi Y Overlay (Contoh: 10, H-h-10 untuk bawah)'
        required: true
        default: '10'
      resolusi_output:
        description: '8. Kunci Resolusi Akhir Siaran'
        type: choice
        required: true
        default: '1280:720'
        options:
          - '1920:1080'
          - '1280:720'
          - '854:480'

      # ==========================================
      # 3. KONTROL AUDIO VIDEO EFFECT (DROPDOWN)
      # ==========================================
      fitur_denoise:
        description: '9. Denoise (Hilangkan Bintik Noise di Area Gelap)'
        type: choice
        required: true
        default: 'matikan'
        options:
          - 'matikan'
          - 'sedang (hqdn3d=4:4:6:6)'
          - 'kuat (hqdn3d=6:6:9:9)'
      fitur_sharpness:
        description: '10. Sharpness (Pertajam Garis Detail Gambar)'
        type: choice
        required: true
        default: 'matikan'
        options:
          - 'matikan'
          - 'sedang (unsharp=5:5:0.8:5:5:0.0)'
          - 'kuat (unsharp=7:7:1.2:7:7:0.0)'
      video_preset:
        description: '11. CPU Preset (Semakin cepat = semakin ringan beban server)'
        type: choice
        required: true
        default: 'veryfast'
        options:
          - 'ultrafast (paling ringan)'
          - 'veryfast (standar aman)'
          - 'medium (berat, kualitas tinggi)'

      # ==========================================
      # 4. LAPISAN TEKS DINAMIS (DRAWTEXT)
      # ==========================================
      text_1:
        description: '12. Teks Statis Banner (Kosongkan jika tidak pakai)'
        required: false
      text_1_posisi:
        description: '13. Posisi Teks Statis Banner'
        type: choice
        required: true
        default: 'atas_kiri'
        options:
          - 'atas_kiri'
          - 'atas_kanan'
          - 'bawah_tengah'
      text_running:
        description: '14. Running Text / Teks Berjalan dari Kanan ke Kiri'
        required: false

      # ==========================================
      # 5. TARGET UTAMA & TARGET CADANGAN (SIMULCAST)
      # ==========================================
      rtmp_url:
        description: '15. Target 1: RTMP Server URL'
        required: true
        default: 'rtmp://a.rtmp.youtube.com/live2'
      stream_key:
        description: '16. Target 1: Stream Key'
        required: true
      rtmp_url_2:
        description: '17. Target 2 (Simulcast): RTMP URL Tambahan (Kosongkan jika hanya live ke 1 tempat)'
        required: false
      stream_key_2:
        description: '18. Target 2 (Simulcast): Stream Key Tambahan'
        required: false

jobs:
  live-streaming:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg 8 via PPA
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -qq > /dev/null
          sudo apt install -t "o=LP-PPA-ubuntuhandbook1-ffmpeg8" ffmpeg -y -qq > /dev/null

      - name: Eksekusi Otomatisasi Fitur Lengkap FFmpeg
        env:
          VIDEO: ${{ github.event.inputs.video_source }}
          LOOP: ${{ github.event.inputs.loop_video }}
          AUDIO: ${{ github.event.inputs.audio_source }}
          IMAGE: ${{ github.event.inputs.image_source }}
          L_WIDTH: ${{ github.event.inputs.logo_width }}
          L_X: ${{ github.event.inputs.logo_x }}
          L_Y: ${{ github.event.inputs.logo_y }}
          RES: ${{ github.event.inputs.resolusi_output }}
          DENOISE: ${{ github.event.inputs.fitur_denoise }}
          SHARP: ${{ github.event.inputs.fitur_sharpness }}
          PRESET: ${{ github.event.inputs.video_preset }}
          TXT1: ${{ github.event.inputs.text_1 }}
          TXT1_POS: ${{ github.event.inputs.text_1_posisi }}
          TXTRUN: ${{ github.event.inputs.text_running }}
          SERVER1: ${{ github.event.inputs.rtmp_url }}
          KEY1: ${{ github.event.inputs.stream_key }}
          SERVER2: ${{ github.event.inputs.rtmp_url_2 }}
          KEY2: ${{ github.event.inputs.stream_key_2 }}
        run: |
          # ------------------------------------------
          # PARSING INPUT ARGUMENTS & DETEKSI FORMAT
          # ------------------------------------------
          V_FLAG=""
          if [[ "$LOOP" == *"ya"* ]]; then V_FLAG="-stream_loop -1"; fi

          if [[ "$IMAGE" == *.gif ]]; then
            INPUT_ARGS="$V_FLAG -re -i $VIDEO -ignore_loop 0 -i $IMAGE"
          elif [ ! -z "$IMAGE" ]; then
            INPUT_ARGS="$V_FLAG -re -i $VIDEO -i $IMAGE"
          else
            INPUT_ARGS="$V_FLAG -re -i $VIDEO"
          fi

          if [ ! -z "$AUDIO" ]; then INPUT_ARGS="$INPUT_ARGS -i $AUDIO"; fi

          # PARSING PRESET CPU
          MY_PRESET="veryfast"
          if [[ "$PRESET" == *"ultrafast"* ]]; then MY_PRESET="ultrafast"; fi
          if [[ "$PRESET" == *"medium"* ]]; then MY_PRESET="medium"; fi

          # ------------------------------------------
          # CONSTRUCT VIDEO FILTERS MAP (V_FILTERS)
          # ------------------------------------------
          V_FILTERS="scale=$RES,setsar=1,setdar=16/9"
          if [[ "$DENOISE" == *"sedang"* ]]; then V_FILTERS="$V_FILTERS,hqdn3d=4:4:6:6"; fi
          if [[ "$DENOISE" == *"kuat"* ]]; then V_FILTERS="$V_FILTERS,hqdn3d=6:6:9:9"; fi
          if [[ "$SHARP" == *"sedang"* ]]; then V_FILTERS="$V_FILTERS,unsharp=5:5:0.8:5:5:0.0"; fi
          if [[ "$SHARP" == *"kuat"* ]]; then V_FILTERS="$V_FILTERS,unsharp=7:7:1.2:7:7:0.0"; fi

          # BUILD FILTER COMPLEX LAYERING STRATEGY
          FILTER_COMPLEX="[0:v]$V_FILTERS[v_dasar];"
          CURRENT_V_STREAM="[v_dasar]"

          # Layering Logo/Gambar
          if [ ! -z "$IMAGE" ]; then
            FILTER_COMPLEX="${FILTER_COMPLEX}[1:v]scale=${L_WIDTH}:-1[logo];$CURRENT_V_STREAM[logo]overlay=x=${L_X}:y=${L_Y}:shortest=1[v_overlay];"
            CURRENT_V_STREAM="[v_overlay]"
          fi

          # Layering Teks Statis
          if [ ! -z "$TXT1" ]; then
            if [ "$TXT1_POS" = "atas_kiri" ]; then T_X="10"; T_Y="10";
            elif [ "$TXT1_POS" = "atas_kanan" ]; then T_X="W-tw-10"; T_Y="10";
            else T_X="(W-tw)/2"; T_Y="H-th-50"; fi
            FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V_STREAM""drawtext=text='$TXT1':x=$T_X:y=$T_Y:fontsize=24:fontcolor=white:box=1:boxcolor=black@0.5[v_txt1];"
            CURRENT_V_STREAM="[v_txt1]"
          fi

          # Layering Teks Berjalan
          if [ ! -z "$TXTRUN" ]; then
            FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V_STREAM""drawtext=text='$TXTRUN':x=W-mod(t*100\,W+tw):y=H-th-10:fontsize=24:fontcolor=yellow:box=1:boxcolor=black@0.6[v_txtrun];"
            CURRENT_V_STREAM="[v_txtrun]"
          fi
          FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V_STREAM""split[v_final]"

          # ------------------------------------------
          # CONSTRUCT AUDIO FILTER & ANTI-DESYNC MAP
          # ------------------------------------------
          # Menggunakan aresample=async=1 untuk menjaga sinkronisasi audio-video di internet dinamis
          if [ ! -z "$AUDIO" ]; then
            FILTER_COMPLEX="${FILTER_COMPLEX};[0:a]aresample=async=1[a_sync];[a_sync][2:a]amix=inputs=2:duration=first[a_final]"
            MAP_ARGS="-map [v_final] -map [a_final]"
          else
            FILTER_COMPLEX="${FILTER_COMPLEX};[0:a]aresample=async=1[a_final]"
            MAP_ARGS="-map [v_final] -map [a_final]"
          fi

          # ------------------------------------------
          # CONFIGURATION MULTI-STREAM TARGET (TEE MUXER)
          # ------------------------------------------
          # Penyelamat jaringan bawaan: rw_timeout & drop_pkts_on_overflow diaktifkan otomatis
          URL_1="$SERVER1/$KEY1"
          TARGET_OUTPUT=""

          if [ ! -z "$SERVER2" ] && [ ! -z "$KEY2" ]; then
            URL_2="$SERVER2/$KEY2"
            echo "Mode Aktif: MULTI-STREAMING (SIMULCAST) KE 2 PLATFORM!"
            TARGET_OUTPUT="-f tee [f=flv:flvflags=no_duration_filesize]$URL_1|[f=flv:flvflags=no_duration_filesize]$URL_2"
          else
            echo "Mode Aktif: SINGLE STREAMING STANDARD."
            TARGET_OUTPUT="-f flv -flvflags no_duration_filesize $URL_1"
          fi

          # ------------------------------------------
          # RUNNING CORES COMMAND FFMPEG ENGINE
          # ------------------------------------------
          ffmpeg -y -drop_pkts_on_overflow 1 $INPUT_ARGS \
            -filter_complex "$FILTER_COMPLEX" \
            $MAP_ARGS \
            -c:v libx264 -preset $MY_PRESET -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -pix_fmt yuv420p -g 60 -async 1 \
            -c:a aac -b:a 128k \
            $TARGET_OUTPUT
            
