name: FFmpeg Essential Livestream

on:
  workflow_dispatch:
    inputs:
      # =========================
      # 1. INPUT & PENGATURAN DASAR
      # =========================
      video:
        description: 'Input Video (URL atau Nama File)'
        required: true
        default: 'input.mp4'
      is_loop:
        description: 'Loop Video? (-stream_loop)'
        type: choice
        options:
          - default (Tanpa Loop)
          - Loop Terus Menerus (-1)
        default: 'default (Tanpa Loop)'
      is_re:
        description: 'Gunakan Realtime? (-re) - Wajib untuk streaming file'
        type: choice
        options:
          - default (Gunakan -re)
          - Tanpa -re (Maksimal Speed)
        default: 'default (Gunakan -re)'

      # =========================
      # 2. PENGATURAN ENCODING (KUALITAS)
      # =========================
      video_codec:
        description: 'Video Codec'
        type: choice
        options:
          - default (copy)
          - libx264
        default: 'default (copy)'
      video_preset:
        description: 'Preset Kecepatan (Jika pakai libx264)'
        type: choice
        options:
          - default (none)
          - ultrafast
          - veryfast
        default: 'default (none)'
      video_bitrate:
        description: 'Video Bitrate (Misal: 2500k) - Kosongkan untuk default'
        required: false
        default: ''
      audio_codec:
        description: 'Audio Codec (AAC sangat disarankan untuk RTMP)'
        type: choice
        options:
          - default (copy)
          - aac
        default: 'default (copy)'
        
      # =========================
      # 3. COMMAND TAMBAHAN
      # =========================
      extra_cmd:
        description: 'Command Ekstra (Ketik bebas, misal: -maxrate 3000k)'
        required: false
        default: ''

      # =========================
      # 4. DESTINASI STREAM
      # =========================
      rtmp_link:
        description: 'Link RTMP Server'
        required: true
        default: 'rtmp://a.rtmp.youtube.com/live2'
      stream_key:
        description: 'Stream Key'
        required: true
        default: ''

jobs:
  ffmpeg:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up FFmpeg 8
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -y -qq > /dev/null
          sudo apt install ffmpeg -y -qq > /dev/null
          
      - name: Jalankan FFmpeg Stream
        run: |
          VIDEO="${{ github.event.inputs.video }}"
          IS_LOOP="${{ github.event.inputs.is_loop }}"
          IS_RE="${{ github.event.inputs.is_re }}"
          
          V_CODEC="${{ github.event.inputs.video_codec }}"
          V_PRESET="${{ github.event.inputs.video_preset }}"
          V_BITRATE="${{ github.event.inputs.video_bitrate }}"
          
          A_CODEC="${{ github.event.inputs.audio_codec }}"
          EXTRA_CMD="${{ github.event.inputs.extra_cmd }}"
          
          RTMP="${{ github.event.inputs.rtmp_link }}"
          KEY="${{ github.event.inputs.stream_key }}"

          while true; do
            echo "Memulai proses perakitan command..."
            CMD="ffmpeg"
            
            # 1. Parameter Input (Loop & Realtime)
            if [[ "$IS_RE" == "default (Gunakan -re)" ]]; then CMD="$CMD -re"; fi
            if [[ "$IS_LOOP" == "Loop Terus Menerus (-1)" ]]; then CMD="$CMD -stream_loop -1"; fi
            CMD="$CMD -i \"$VIDEO\""
            
            # 2. Parameter Video
            if [[ "$V_CODEC" == "default"* ]]; then CMD="$CMD -c:v copy"; else CMD="$CMD -c:v $V_CODEC"; fi
            if [[ "$V_PRESET" != "default"* ]]; then CMD="$CMD -preset $V_PRESET"; fi
            if [[ -n "$V_BITRATE" ]]; then CMD="$CMD -b:v $V_BITRATE"; fi
            
            # 3. Parameter Audio
            if [[ "$A_CODEC" == "default"* ]]; then CMD="$CMD -c:a copy"; else CMD="$CMD -c:a $A_CODEC"; fi
            
            # 4. Command Bebas
            if [[ -n "$EXTRA_CMD" ]]; then CMD="$CMD $EXTRA_CMD"; fi
            
            # 5. Output
            CMD="$CMD -f flv \"$RTMP/$KEY\""
            
            echo "Menjalankan: $CMD"
            eval $CMD
            
            if [ $? -ne 0 ]; then
              echo "Koneksi terputus atau error. Restarting FFmpeg dalam 5 detik..."
              sleep 5
            else
              echo "Stream selesai tanpa error."
              break
            fi
          done
