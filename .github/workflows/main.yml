name: STREAMER FFMPEG ALL-IN-ONE SUPERBOX

on:
  workflow_dispatch:
    inputs:
      # ==========================================
      # 📹 SLOT INPUT VIDEO (MAX 3) & LOOPING
      # ==========================================
      video_1:
        description: '▶️ VIDEO 1 (WAJIB - Video Utama Fullscreen)'
        required: true
        default: 'https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4'
      loop_video:
        description: '🔄 Putar Ulang Semua Video Terus-Menerus (Looping)?'
        type: choice
        required: true
        default: 'tidak'
        options: [tidak, ya]

      video_2:
        description: '🎞️ VIDEO 2 (Opsional - Video PIP Tambahan)'
        required: false
      v2_layout:
        description: '└⚙️ Posisi Video 2 (Lebar: 320px, FPS: 30)'
        type: choice
        required: true
        default: 'kanan_bawah'
        options: [kanan_bawah, kiri_bawah, kanan_atas, kiri_atas]

      video_3:
        description: '🎞️ VIDEO 3 (Opsional - Video PIP Tambahan)'
        required: false
      v3_layout:
        description: '└⚙️ Posisi Video 3 (Lebar: 320px, FPS: 30)'
        type: choice
        required: true
        default: 'kiri_bawah'
        options: [kiri_bawah, kanan_bawah, kanan_atas, kiri_atas]

      # ==========================================
      # 🎵 SLOT INPUT AUDIO / MUSIC BACKGROUND (MAX 3)
      # ==========================================
      audio_1:
        description: '🎵 AUDIO BACKSOUND 1 (Opsional - Musik Mixer)'
        required: false
      audio_2:
        description: '🎵 AUDIO BACKSOUND 2 (Opsional - Musik Mixer)'
        required: false

      # ==========================================
      # 🖼️ SLOT INPUT GAMBAR / LOGO / GIF (MAX 3)
      # ==========================================
      image_1:
        description: '🖼️ GAMBAR 1 (Opsional - Logo/Watermark/GIF Loop)'
        required: false
      img1_layout:
        description: '└⚙️ Posisi Gambar 1'
        type: choice
        required: true
        default: 'kanan_atas'
        options: [kanan_atas, kiri_atas, kanan_bawah, kiri_bawah]

      image_2:
        description: '🖼️ GAMBAR 2 (Opsional - Logo/Watermark/GIF Loop)'
        required: false
      img2_layout:
        description: '└⚙️ Posisi Gambar 2'
        type: choice
        required: true
        default: 'kiri_atas'
        options: [kiri_atas, kanan_atas, kanan_bawah, kiri_bawah]

      # ==========================================
      # 📝 SLOT INPUT TEKS / DRAWTEXT (MAX 3)
      # ==========================================
      text_statis_1:
        description: '📝 TEKS BANNER STATIS (Opsional - Pojok Atas)'
        required: false
      text_running_1:
        description: '🏃 RUNNING TEXT / TEKS BERJALAN (Opsional - Bawah Layar)'
        required: false

      # ==========================================
      # 🎛️ FILTER KOREKSI KUALITAS VIDEO & PRESET
      # ==========================================
      resolusi_output:
        description: '📺 Resolusi Hasil Siaran Akhir (Paksa AR 16:9)'
        type: choice
        required: true
        default: '1280:720'
        options: ['1920:1080', '1280:720', '854:480']
      fitur_denoise:
        description: '✨ Denoise (Hilangkan Bintik Kebisingan/Gelap hqdn3d)'
        type: choice
        required: true
        default: 'matikan'
        options: [matikan, 'sedang (hqdn3d=4:4:6:6)', 'kuat (hqdn3d=6:6:9:9)']
      fitur_sharpness:
        description: '🎯 Sharpness (Pertajam Detail Garis/Teks unsharp)'
        type: choice
        required: true
        default: 'matikan'
        options: [matikan, 'sedang (unsharp=5:5:0.8:5:5:0.0)', 'kuat (unsharp=7:7:1.2:7:7:0.0)']
      video_preset:
        description: '⚡ CPU Preset (Beban Kerja Server GitHub Actions)'
        type: choice
        required: true
        default: 'ultrafast'
        options: [ultrafast, veryfast, medium]

      # ==========================================
      # 🚀 TARGET RTMP (DUMMY MULTI-STREAMING / SIMULCAST)
      # ==========================================
      rtmp_url:
        description: '🚀 Target 1: RTMP Server URL'
        required: true
        default: 'rtmp://a.rtmp.youtube.com/live2'
      stream_key:
        description: '🔑 Target 1: Stream Key'
        required: true
      rtmp_url_2:
        description: '🚀 Target 2 (Simulcast): RTMP URL Tambahan (Maks 2 Akun)'
        required: false
      stream_key_2:
        description: '🔑 Target 2 (Simulcast): Stream Key Tambahan'
        required: false

jobs:
  live-streaming:
    runs-on: ubuntu-latest

    steps:
      # FITUR 1: Install FFmpeg rilis stabil mayor ke-8 melalui PPA Resmi
      - name: Install FFmpeg 8 via PPA
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -qq > /dev/null
          sudo apt install -t "o=LP-PPA-ubuntuhandbook1-ffmpeg8" ffmpeg -y -qq > /dev/null

      # FITUR 2: Cek Versi Hasil untuk Verifikasi Log Sistem
      - name: Cek Hasil Versi FFmpeg
        run: |
          ffmpeg -version | head -n 1

      # FITUR 3: Eksekusi Otomatisasi Logika Gabungan Seluruh Fitur (Bash Multi-Layer Engine)
      - name: Eksekusi Multi-Input Cloud Streamer
        env:
          V1: ${{ github.event.inputs.video_1 }}
          V2: ${{ github.event.inputs.video_2 }}
          V2_LAY: ${{ github.event.inputs.v2_layout }}
          V3: ${{ github.event.inputs.video_3 }}
          V3_LAY: ${{ github.event.inputs.v3_layout }}
          A1: ${{ github.event.inputs.audio_1 }}
          A2: ${{ github.event.inputs.audio_2 }}
          I1: ${{ github.event.inputs.image_1 }}
          I1_LAY: ${{ github.event.inputs.img1_layout }}
          I2: ${{ github.event.inputs.image_2 }}
          I2_LAY: ${{ github.event.inputs.img2_layout }}
          TXT_S: ${{ github.event.inputs.text_statis_1 }}
          TXT_R: ${{ github.event.inputs.text_running_1 }}
          LOOP: ${{ github.event.inputs.loop_all }}
          RES: ${{ github.event.inputs.resolusi_output }}
          DENOISE: ${{ github.event.inputs.fitur_denoise }}
          SHARP: ${{ github.event.inputs.fitur_sharpness }}
          PRESET: ${{ github.event.inputs.video_preset }}
          SERVER1: ${{ github.event.inputs.rtmp_url }}
          KEY1: ${{ github.event.inputs.stream_key }}
          SERVER2: ${{ github.event.inputs.rtmp_url_2 }}
          KEY2: ${{ github.event.inputs.stream_key_2 }}
        run: |
          # A. KONTROL FITUR LOOPING UTAMA
          L_FLAG=""
          if [[ "$LOOP" == "ya" ]]; then L_FLAG="-stream_loop -1"; fi
          
          INPUT_ARGS="$L_FLAG -re -i $V1"
          NEXT_IDX=1
          
          V2_IDX=""; V3_IDX=""; I1_IDX=""; I2_IDX=""; A1_IDX=""; A2_IDX=""

          # B. PENATAAN STRUKTUR INPUT MULTI-MEDIA SECARA DINAMIS
          if [ ! -z "$V2" ]; then INPUT_ARGS="$INPUT_ARGS $L_FLAG -re -i $V2"; V2_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1)); fi
          if [ ! -z "$V3" ]; then INPUT_ARGS="$INPUT_ARGS $L_FLAG -re -i $V3"; V3_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1)); fi
          
          if [ ! -z "$I1" ]; then 
            G_FLAG=""; if [[ "$I1" == *.gif ]]; then G_FLAG="-ignore_loop 0"; fi
            INPUT_ARGS="$INPUT_ARGS $G_FLAG -i $I1"; I1_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1))
          fi
          if [ ! -z "$I2" ]; then 
            G_FLAG=""; if [[ "$I2" == *.gif ]]; then G_FLAG="-ignore_loop 0"; fi
            INPUT_ARGS="$INPUT_ARGS $G_FLAG -i $I2"; I2_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1))
          fi

          if [ ! -z "$A1" ]; then INPUT_ARGS="$INPUT_ARGS -i $A1"; A1_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1)); fi
          if [ ! -z "$A2" ]; then INPUT_ARGS="$INPUT_ARGS -i $A2"; A2_IDX=$NEXT_IDX; NEXT_IDX=$((NEXT_IDX + 1)); fi

          # C. PROSES PENYUSUNAN FITUR KOREKSI GAMBAR BASE (KUNCI FPS = 30 + ASPECT RATIO 16:9)
          V_FILTERS="scale=$RES,fps=30,setsar=1,setdar=16/9"
          if [[ "$DENOISE" == *"sedang"* ]]; then V_FILTERS="$V_FILTERS,hqdn3d=4:4:6:6"; fi
          if [[ "$DENOISE" == *"kuat"* ]]; then V_FILTERS="$V_FILTERS,hqdn3d=6:6:9:9"; fi
          if [[ "$SHARP" == *"sedang"* ]]; then V_FILTERS="$V_FILTERS,unsharp=5:5:0.8:5:5:0.0"; fi
          if [[ "$SHARP" == *"kuat"* ]]; then V_FILTERS="$V_FILTERS,unsharp=7:7:1.2:7:7:0.0"; fi

          FILTER_COMPLEX="[0:v]$V_FILTERS[v_base];"
          CURRENT_V="[v_base]"

          # HELPER FUNGSI MENGHITUNG TATA LETAK KOORDINAT
          get_coords() {
            if [ "$1" = "kanan_bawah" ]; then echo "x=W-w-10:y=H-h-10";
            elif [ "$1" = "kiri_bawah" ]; then echo "x=10:y=H-h-10";
            elif [ "$1" = "kanan_atas" ]; then echo "x=W-w-10:y=10";
            else echo "x=10:y=10"; fi
          }

          # D. PROSES LAYER VIDEO PIP (DIPAKSA 30 FPS BIAR SINKRON)
          if [ ! -z "$V2_IDX" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}[$V2_IDX:v]scale=320:-1,fps=30[v2_s];$CURRENT_V[v2_s]overlay=$(get_coords '$V2_LAY'):shortest=1[lv2];"; CURRENT_V="[lv2]"; fi
          if [ ! -z "$V3_IDX" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}[$V3_IDX:v]scale=320:-1,fps=30[v3_s];$CURRENT_V[v3_s]overlay=$(get_coords '$V3_LAY'):shortest=1[lv3];"; CURRENT_V="[lv3]"; fi

          # E. PROSES LAYER OVERLAY GAMBAR / LOGO / GIF ANIMASI
          if [ ! -z "$I1_IDX" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}[$I1_IDX:v]scale=180:-1[img1];$CURRENT_V[img1]overlay=$(get_coords '$I1_LAY'):shortest=1[li1];"; CURRENT_V="[li1]"; fi
          if [ ! -z "$I2_IDX" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}[$I2_IDX:v]scale=180:-1[img2];$CURRENT_V[img2]overlay=$(get_coords '$I2_LAY'):shortest=1[li2];"; CURRENT_V="[li2]"; fi

          # F. PROSES LAYER DRAWTEXT (TEKS STATIS BANNER)
          if [ ! -z "$TXT_S" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V""drawtext=text='$TXT_S':x=20:y=20:fontsize=24:fontcolor=white:box=1:boxcolor=black@0.5[ltxts];"; CURRENT_V="[ltxts]"; fi

          # G. PROSES LAYER DRAWTEXT (RUNNING TEXT BERJALAN DINAMIS)
          if [ ! -z "$TXT_R" ]; then FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V""drawtext=text='$TXT_R':x=W-mod(t*100\,W+tw):y=H-th-15:fontsize=24:fontcolor=yellow:box=1:boxcolor=black@0.6[ltxtr];"; CURRENT_V="[ltxtr]"
          fi
          FILTER_COMPLEX="${FILTER_COMPLEX}$CURRENT_V""split[v_final]"

          # H. PROSES FILTER AUDIO MIXER & AKSELERASI ANTI-DESYNC PERMANEN (aresample=async=1)
          AUDIO_INPUTS="[0:a]aresample=async=1[a_init];[a_init]"
          AUDIO_COUNT=1
          if [ ! -z "$A1_IDX" ]; then AUDIO_INPUTS="$AUDIO_INPUTS[$A1_IDX:a]"; AUDIO_COUNT=$((AUDIO_COUNT + 1)); fi
          if [ ! -z "$A2_IDX" ]; then AUDIO_INPUTS="$AUDIO_INPUTS[$A2_IDX:a]"; AUDIO_COUNT=$((AUDIO_COUNT + 1)); fi

          FILTER_COMPLEX="${FILTER_COMPLEX};$AUDIO_INPUTS""amix=inputs=$AUDIO_COUNT:duration=first:dropout_transition=2[a_final]"

          # I. FITUR MULTI-STREAMING TARGET (TEE MUXER LOGIC) & PENYELAMAT DROPOUT JARINGAN
          URL_1="$SERVER1/$KEY1"
          TARGET_OUTPUT=""
          if [ ! -z "$SERVER2" ] && [ ! -z "$KEY2" ]; then
            URL_2="$SERVER2/$KEY2"
            TARGET_OUTPUT="-f tee [f=flv:flvflags=no_duration_filesize]$URL_1|[f=flv:flvflags=no_duration_filesize]$URL_2"
          else
            TARGET_OUTPUT="-f flv -flvflags no_duration_filesize $URL_1"
          fi

          # J. EKSEKUSI MESIN UTAMA FFMPEG DENGAN KONTROL OVERFLOW MEMORI (-drop_pkts_on_overflow 1)
          ffmpeg -y -drop_pkts_on_overflow 1 $INPUT_ARGS \
            -filter_complex "$FILTER_COMPLEX" \
            -map "[v_final]" -map "[a_final]" \
            -c:v libx264 -preset $PRESET -b:v 3000k -maxrate 3000k -bufsize 6000k \
            -pix_fmt yuv420p -g 60 -async 1 \
            -c:a aac -b:a 128k \
            $TARGET_OUTPUT
            
