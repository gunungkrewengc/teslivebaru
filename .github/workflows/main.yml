      - name: Setup FFmpeg (Versi Default Action)
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cek Hasil Versi FFmpeg
        run: |
          # Perintah ini akan menampilkan info versi lengkap di log GitHub Actions
          ffmpeg -version
          
