name: FFmpeg Full Features

on:
  workflow_dispatch:
    inputs:
      # =========================
      # 1. KOLOM VIDEO
      # =========================
      video:
        description: 'Input Video (Wajib: URL/File)'
        required: true
        default: 'input.mp4'
      video_codec:
        description: 'Command Video: Codec'
        type: choice
        options:
          - default (copy)
          - libx264
          - libx265
        default: 'default (copy)'
      video_preset:
        description: 'Command Video: Preset (hanya untuk x264/x265)'
        type: choice
        options:
          - default (none)
          - ultrafast
          - veryfast
          - medium
        default: 'default (none)'

      # =========================
      # 2. KOLOM AUDIO
      # =========================
      audio:
        description: 'Input Audio Tambahan (Kosongkan jika pakai audio asli video)'
        required: false
        default: ''
      audio_codec:
        description: 'Command Audio: Codec'
        type: choice
        options:
          - default (copy)
          - aac
          - libmp3lame
        default: 'default (copy)'

      # =========================
      # 3. KOLOM GAMBAR (WATERMARK)
      # =========================
      image:
        description: 'Input Gambar (URL/File) - Kosongkan jika tidak ada'
        required: false
        default: ''
      image_scale:
        description: 'Command Gambar: Ukuran (Lebar)'
        type: choice
        options:
          - default (ukuran asli)
          - 100:-1 (Lebar 100px)
          - 200:-1 (Lebar 200px)
        default: 'default (ukuran asli)'
      image_pos:
        description: 'Command Gambar: Posisi'
        type: choice
        options:
          - default (Kanan Atas)
          - Kiri Atas
          - Kanan Bawah
          - Kiri Bawah
        default: 'default (Kanan Atas)'

      # =========================
      # 4. KOLOM TEKS
      # =========================
      text:
        description: 'Input Teks (Kosongkan jika tidak ada)'
        required: false
        default: ''
      text_color:
        description: 'Command Teks: Warna'
        type: choice
        options:
          - default (white)
          - red
          - yellow
          - black
        default: 'default (white)'
      text_size:
        description: 'Command Teks: Ukuran Font'
        type: choice
        options:
          - default (24)
          - 36
          - 48
        default: 'default (24)'

      # =========================
      # 5. KOLOM OUTPUT
      # =========================
      rtmp_link:
        description: 'Link RTMP'
        required: true
        default: 'rtmp://'
      stream_key:
        description: 'Stream Key'
        required: true
        default: ''

jobs:
  ffmpeg:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up FFmpeg 8
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -y -qq > /dev/null
          sudo apt install ffmpeg -y -qq > /dev/null
          
      - name: Jalankan FFmpeg dengan Filter Dinamis
        run: |
          # Mengambil semua input
          VIDEO="${{ github.event.inputs.video }}"
          V_CODEC="${{ github.event.inputs.video_codec }}"
          V_PRESET="${{ github.event.inputs.video_preset }}"
          
          AUDIO="${{ github.event.inputs.audio }}"
          A_CODEC="${{ github.event.inputs.audio_codec }}"
          
          IMAGE="${{ github.event.inputs.image }}"
          IMG_SCALE="${{ github.event.inputs.image_scale }}"
          IMG_POS="${{ github.event.inputs.image_pos }}"
          
          TEXT="${{ github.event.inputs.text }}"
          TXT_COLOR="${{ github.event.inputs.text_color }}"
          TXT_SIZE="${{ github.event.inputs.text_size }}"
          
          RTMP="${{ github.event.inputs.rtmp_link }}"
          KEY="${{ github.event.inputs.stream_key }}"

          while true; do
            echo "Merakit perintah FFmpeg..."
            
            # 1. Input Dasar (Video)
            CMD="ffmpeg -re -i \"$VIDEO\""
            
            # 2. Input Tambahan (Audio & Gambar)
            if [[ -n "$AUDIO" ]]; then CMD="$CMD -i \"$AUDIO\""; fi
            if [[ -n "$IMAGE" ]]; then CMD="$CMD -i \"$IMAGE\""; fi
            
            # 3. Logika Filter (Jika ada Gambar atau Teks)
            FILTER=""
            V_MAP="0:v"
            
            # Proses Gambar (Overlay)
            if [[ -n "$IMAGE" ]]; then
              # Index gambar: jika ada input audio ekstra, gambar jadi input ke-2, jika tidak input ke-1
              IMG_IDX="1"; if [[ -n "$AUDIO" ]]; then IMG_IDX="2"; fi
              
              # Scale
              SCALE_CMD=""
              if [[ "$IMG_SCALE" != "default"* ]]; then SCALE_CMD="scale=$IMG_SCALE,"; fi
              
              # Posisi
              POS="W-w-10:10" # Default Kanan Atas
              if [[ "$IMG_POS" == "Kiri Atas" ]]; then POS="10:10"; fi
              if [[ "$IMG_POS" == "Kanan Bawah" ]]; then POS="W-w-10:H-h-10"; fi
              if [[ "$IMG_POS" == "Kiri Bawah" ]]; then POS="10:H-h-10"; fi
              
              FILTER="${FILTER}[${IMG_IDX}:v]${SCALE_CMD}format=rgba[wm];[$V_MAP][wm]overlay=$POS[v_img];"
              V_MAP="v_img"
            fi
            
            # Proses Teks (Drawtext)
            if [[ -n "$TEXT" ]]; then
              COLOR="white"; if [[ "$TXT_COLOR" != "default"* ]]; then COLOR="$TXT_COLOR"; fi
              SIZE="24";     if [[ "$TXT_SIZE" != "default"* ]];  then SIZE="$TXT_SIZE"; fi
              
              FILTER="${FILTER}[$V_MAP]drawtext=text='$TEXT':fontcolor=$COLOR:fontsize=$SIZE:x=10:y=H-h-30[v_txt];"
              V_MAP="v_txt"
            fi
            
            # Terapkan Filter Video
            if [[ -n "$FILTER" ]]; then
              # Hapus titik koma terakhir
              FILTER=${FILTER%?} 
              CMD="$CMD -filter_complex \"$FILTER\" -map \"[$V_MAP]\""
              
              # CATATAN: Jika pakai filter gambar/teks, video tidak bisa pakai 'copy'. Harus di-encode.
              if [[ "$V_CODEC" == "default"* ]]; then V_CODEC="libx264"; fi
              CMD="$CMD -c:v $V_CODEC"
            else
              # Jika tidak ada filter gambar/teks
              if [[ "$V_CODEC" == "default"* ]]; then
                CMD="$CMD -c:v copy"
              else
                CMD="$CMD -c:v $V_CODEC"
              fi
            fi
            
            # 4. Terapkan Preset Video
            if [[ "$V_PRESET" != "default"* ]]; then CMD="$CMD -preset $V_PRESET"; fi
            
            # 5. Terapkan Audio Mapping & Codec
            if [[ -n "$AUDIO" ]]; then
              CMD="$CMD -map 1:a"
            else
              CMD="$CMD -map 0:a?"
            fi
            
            if [[ "$A_CODEC" == "default"* ]]; then
              CMD="$CMD -c:a copy"
            else
              CMD="$CMD -c:a $A_CODEC"
            fi
            
            # 6. Terapkan Output
            CMD="$CMD -f flv \"$RTMP/$KEY\""
            
            echo "Mengeksekusi: $CMD"
            eval $CMD
            
            if [ $? -ne 0 ]; then
              echo "Terjadi error. Restart otomatis dalam 5 detik..."
              sleep 5
            else
              echo "Streaming sukses."
              break
            fi
          done
