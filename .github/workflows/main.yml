name: FFmpeg Custom Inputs

on:
  workflow_dispatch:
    inputs:
      video:
        description: 'Input Video (URL atau nama file)'
        required: false
        default: 'input.mp4'
      video_cmd:
        description: 'Command Video (misal: -c:v libx264 -preset veryfast)'
        required: false
        default: '-c:v copy'
      audio:
        description: 'Input Audio (URL atau nama file)'
        required: false
        default: ''
      image:
        description: 'Input Gambar (Watermark / Overlay)'
        required: false
        default: ''
      text:
        description: 'Input Teks'
        required: false
        default: ''
      rtmp_link:
        description: 'Link RTMP (misal: rtmp://a.rtmp.youtube.com/live2)'
        required: false
        default: 'rtmp://'
      stream_key:
        description: 'Stream Key'
        required: false
        default: ''

jobs:
  ffmpeg:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up FFmpeg 8
        run: |
          sudo add-apt-repository ppa:ubuntuhandbook1/ffmpeg8 -y > /dev/null
          sudo apt update -y -qq > /dev/null
          sudo apt install ffmpeg -y -qq > /dev/null
      - name: Run FFmpeg
        run: |
          # Membaca semua inputan kolom ke dalam variabel Bash
          VIDEO="${{ github.event.inputs.video }}"
          VIDEO_CMD="${{ github.event.inputs.video_cmd }}"
          AUDIO="${{ github.event.inputs.audio }}"
          IMAGE="${{ github.event.inputs.image }}"
          TEXT="${{ github.event.inputs.text }}"
          RTMP="${{ github.event.inputs.rtmp_link }}"
          KEY="${{ github.event.inputs.stream_key }}"
          
          while true; do
            # ---------------------------------------------------------
            # Susun perintah FFmpeg kamu di bawah ini. 
            # Ini adalah contoh susunan dasar membaca Video + Command + RTMP/Key
            # ---------------------------------------------------------
            
            ffmpeg -i "$VIDEO" $VIDEO_CMD -f flv "$RTMP/$KEY"
            
            if [ $? -ne 0 ]; then
              echo "FFmpeg stopped with error code $?. Restarting in 5 seconds..."
              sleep 5
            fi
          done
